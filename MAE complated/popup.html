<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meesho Auto-Fill</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      min-height: 200px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      color: #333;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      color: #666;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
    }
    
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn-fetch {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn-fetch:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-fetch:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .status {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }
    
    .status.loading {
      display: block;
      background: #e3f2fd;
      color: #1976d2;
    }
    
    .status.success {
      display: block;
      background: #e8f5e9;
      color: #388e3c;
    }
    
    .status.error {
      display: block;
      background: #ffebee;
      color: #d32f2f;
    }
    
    .debug-info {
      margin-top: 10px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
      font-size: 10px;
      color: #666;
      font-family: monospace;
      max-height: 80px;
      overflow-y: auto;
      display: none;
    }
    
    .debug-info.visible {
      display: block;
    }
    
    .footer {
      margin-top: 15px;
      text-align: center;
      font-size: 10px;
      color: #999;
    }
    
    .settings-link {
      color: #667eea;
      text-decoration: none;
      font-size: 11px;
    }
    
    .settings-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Meesho Auto-Fill</h1>
      <p>Enter Marke Number to auto-fill form</p>
    </div>
    
    <div class="input-group">
      <label for="markeNumber">Marke Number</label>
      <input 
        type="number" 
        id="markeNumber" 
        placeholder="e.g., 1, 2, 3..."
        min="1"
        autocomplete="off"
      >
    </div>
    
    <button id="btnFetch" class="btn-fetch">
      Fetch & Fill Data
    </button>
    
    <div id="status" class="status"></div>
    <div id="debugInfo" class="debug-info"></div>
    
    <div class="footer">
      <a href="#" id="settingsLink" class="settings-link">Configure API URL</a>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
